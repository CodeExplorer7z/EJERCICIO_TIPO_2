<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ruso Blast Slim</title>
    <style>
        :root {--bg:#03051a; --blue:#353cff; --white:#fff; --green:#58cc02; --red:#ea2b2b; --sky:#1cb0f6;}
        * {box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0;}
        
        body {
            background: var(--bg); color: var(--white); font-family: sans-serif;
            overflow: hidden; display: flex; justify-content: center;
            height: 100vh; touch-action: none;
        }

        #game-wrapper {
            position: relative; width: 100%; max-width: 360px; height: 100%;
            display: flex; flex-direction: column; background: #03051a;
        }

        #levels-screen, #overlay {
            position: absolute; inset: 0; background: var(--bg); z-index: 100;
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; padding: 10px; text-align: center;
        }
        #overlay { display: none; }

        .level-card {
            background: rgba(255,255,255,0.08); padding: 10px; border-radius: 8px; 
            margin-bottom: 8px; width: 85%; display: flex; align-items: center; justify-content: space-between;
        }

        #header { padding: 5px 0; text-align: center; }
        #score-val { font-weight: 900; font-size: 2rem; text-shadow: 0 0 8px var(--blue); }
        
        /* AREA DE JUEGO MÁS AMPLIA */
        #play-area { position: relative; flex: 1; overflow: hidden; width: 100%; }
        #ceiling-line { position: absolute; top: 0; width: 100%; height: 2px; background: var(--red); }

        .russian-phrase {
            position: absolute; bottom: -45px; left: 50%; transform: translateX(-50%);
            display: inline-block; background: var(--white); padding: 6px 12px; border-radius: 8px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.5); color: #000;
            font-size: 0.95rem; font-weight: 800; text-align: center; z-index: 5;
        }

        /* CONTROLES ULTRA COMPACTOS */
        #controls { 
            padding: 10px 5px 15px; 
            background: #050821; 
            display: flex; flex-direction: column; align-items: center; 
        }
        .options-grid { 
            display: flex; flex-direction: column; align-items: center; 
            gap: 8px; /* Espacio mínimo entre botones */
            width: 100%; 
        }

        /* BOTONES SLIM */
        .blast-btn { 
            background: var(--blue); color: var(--white); 
            padding: 8px 16px; /* Relleno mínimo */
            font-size: 0.9rem; /* Letra ajustada */
            font-weight: bold; border: none; border-radius: 8px; 
            box-shadow: 0 3px 0 #1a1eb3; display: inline-block;
            width: auto; min-width: 170px; max-width: 90%; text-align: center;
        }
        .blast-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #1a1eb3; }

        .correct-flash { background: var(--green) !important; box-shadow: 0 3px 0 #3d8c02 !important; }
        .wrong-flash { background: var(--red) !important; box-shadow: 0 3px 0 #a31d1d !important; }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <div id="levels-screen">
            <h1 style="color:var(--green); margin-bottom:10px; font-size: 1.4rem;">RUSO BLAST</h1>
            <div class="level-card" onclick="prepareGame(1)"><div><b style="color:var(--sky);">BLOQUE 1</b></div><div>➜</div></div>
            <div class="level-card" onclick="prepareGame(2)"><div><b style="color:var(--sky);">BLOQUE 2</b></div><div>➜</div></div>
        </div>

        <div id="header"><div id="score-val">0</div><div id="pop-anchor"></div></div>
        <div id="play-area"><div id="ceiling-line"></div><div id="phrase-display" class="russian-phrase"></div></div>
        <div id="controls"><div class="options-grid" id="options"></div></div>

        <div id="overlay">
            <h2 id="ov-msg" style="font-size:1.3rem; margin-bottom:10px;"></h2>
            <button class="blast-btn" style="background:var(--green); box-shadow:0 3px 0 #46a302;" onclick="startGame()">OTRA VEZ</button>
            <button class="blast-btn" style="margin-top:8px; background:transparent; border:1px solid #444; box-shadow:none;" onclick="returnToMenu()">MENU</button>
        </div>
    </div>

    <script>
        let audioCtx=null, score=0, phrasesAnswered=0, activeData=[], ceilingCheck, canAnswer=false;
        const allPhrases = [
            {r:"Привет, как тебя зовут?", s:"¿Hola, cómo te llamas?"},{r:"Я знаю это место", s:"Yo conozco este lugar"},
            {r:"Я думаю, это хорошая idea", s:"Pienso que es una buena idea"},{r:"Это длинное слово", s:"Esta es una palabra muy larga"},
            {r:"Подожди, я сейчас приду", s:"Espera, ahora vengo"},{r:"Давай пойдём в парк", s:"Vamos al parque"},
            {r:"Я всё понял, спасибо", s:"Lo entendí todo, gracias"},{r:"Короче, мы опоздали", s:"En fin, llegamos tarde"},
            {r:"Кстати, где мой чай?", s:"Por cierto, ¿dónde está mi té?"},{r:"Ладно, давай сделаем это", s:"Está bien, hagámoslo"},
            {r:"Ничего, всё нормально", s:"No es nada, todo bien"},{r:"Осталось мало времени", s:"Queda poco tiempo"},
            {r:"Слышишь, что он говорит?", s:"¿Oyes lo que él dice?"},{r:"Тебе muy bien esto платье!", s:"¡Te queda muy bien ese vestido!"},
            {r:"Ясненько, я всё сделаю", s:"Vale, yo me encargo de todo"},{r:"Капец, como hace frío aquí!", s:"¡Vaya, qué frío hace aquí!"},
            {r:"Блин, я забыл ключи", s:"Rayos, olvidé las llaves"},{r:"Как дела?", s:"¿Cómo estás?"},
            {r:"Лучше всех", s:"Mejor que todos"},{r:"Всё пучком", s:"Todo va de maravilla"}
        ];

        function initAudio(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); if(audioCtx.state==='suspended') audioCtx.resume(); }
        function playSnd(isC){
            if(!audioCtx) return;
            const n = isC ? [523, 659] : [220, 180];
            n.forEach((f, i) => {
                const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                o.type = 'triangle'; o.frequency.setValueAtTime(f, audioCtx.currentTime + (i * 0.1));
                g.gain.setValueAtTime(0.05, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                o.connect(g); g.connect(audioCtx.destination);
                o.start(); o.stop(audioCtx.currentTime + 0.3);
            });
        }
        function showPop(t, c){ const a=document.getElementById('pop-anchor'), p=document.createElement('div'); p.className='points-pop'; p.innerText=t; p.style.color=c; a.appendChild(p); setTimeout(()=>p.remove(),600); }
        function returnToMenu(){ clearInterval(ceilingCheck); document.getElementById('overlay').style.display='none'; document.getElementById('levels-screen').style.display='flex'; }
        function prepareGame(b){ initAudio(); activeData=(b===1)?allPhrases.slice(0,10):allPhrases.slice(10,20); document.getElementById('levels-screen').style.display='none'; startGame(); }
        function startGame(){ score=0; phrasesAnswered=0; document.getElementById('score-val').innerText="0"; document.getElementById('overlay').style.display='none'; nextQuestion(); }

        function nextQuestion(){
            if(phrasesAnswered>=10){ endGame(); return; } 
            canAnswer=false; clearInterval(ceilingCheck); 
            const item=activeData[phrasesAnswered]; 
            const pEl=document.getElementById('phrase-display'); 
            pEl.style.transition='none'; pEl.style.transform='translateX(-50%) translateY(0)'; pEl.innerText=item.r; 
            const oEl=document.getElementById('options'); oEl.innerHTML=''; 
            let w=allPhrases[Math.floor(Math.random()*allPhrases.length)]; while(w.s===item.s) w=allPhrases[Math.floor(Math.random()*allPhrases.length)]; 
            [{s:item.s,c:true},{s:w.s,c:false}].sort(()=>Math.random()-0.5).forEach(o=>{ const b=document.createElement('button'); b.className='blast-btn'; b.innerText=o.s; b.onclick=()=>check(o.c,b); oEl.appendChild(b); }); 

            setTimeout(() => {
                const playArea = document.getElementById('play-area');
                pEl.style.transition='transform 4.5s linear'; pEl.style.transform=`translateX(-50%) translateY(-${playArea.offsetHeight + 50}px)`; 
                canAnswer=true; 
                ceilingCheck=setInterval(() => { if(pEl.getBoundingClientRect().top < playArea.getBoundingClientRect().top && canAnswer) fail(); }, 60);
            }, 300);
        }

        function check(c,b){
            if(!canAnswer) return; canAnswer=false; clearInterval(ceilingCheck); 
            if(c){ playSnd(true); score+=20; b.classList.add('correct-flash'); showPop("+20","var(--sky)"); }
            else{ playSnd(false); score=Math.max(0,score-10); b.classList.add('wrong-flash'); showPop("-10","var(--red)"); } 
            phrasesAnswered++; document.getElementById('score-val').innerText=score; setTimeout(nextQuestion, 500);
        }
        function fail(){ canAnswer=false; clearInterval(ceilingCheck); playSnd(false); score=Math.max(0,score-10); showPop("-10","var(--red)"); phrasesAnswered++; document.getElementById('score-val').innerText=score; setTimeout(nextQuestion, 500); }
        function endGame(){ document.getElementById('overlay').style.display='flex'; document.getElementById('ov-msg').innerText="Puntos: "+score; }
    </script>
</body>
</html>
