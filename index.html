<style>
    :root {
        --bg: #0a0b1e;
        --surface: #161b33;
        --blue: #353cff;
        --white: #ffffff;
        --green: #58cc02;
        --red: #ff4b4b;
        --sky: #1cb0f6;
        --gray: #afafaf;
    }

    * { 
        box-sizing: border-box; 
        -webkit-tap-highlight-color: transparent; 
        margin: 0; padding: 0; 
    }
    
    body {
        background: var(--bg);
        color: var(--white);
        font-family: 'Segoe UI', Roboto, sans-serif;
        /* Usamos dvh para que se adapte dinámicamente si la barra de Edge sube o baja */
        height: 100vh;
        height: 100dvh; 
        overflow: hidden;
        display: flex;
        justify-content: center;
        /* Evita rebotes elásticos en móviles */
        position: fixed;
        width: 100%;
    }

    #game-wrapper {
        position: relative;
        width: 100%;
        max-width: 450px;
        /* Asegura que el contenido use todo el espacio disponible sin salirse */
        height: 100%;
        display: flex;
        flex-direction: column;
        background: radial-gradient(circle at top, #1a1f4d 0%, var(--bg) 100%);
        /* Padding inferior extra para evitar la barra de navegación de Edge */
        padding-bottom: env(safe-area-inset-bottom, 20px);
    }

    #header { 
        padding: 15px 20px 5px; 
        display: flex; 
        justify-content: space-between; 
        align-items: center;
        flex-shrink: 0; /* Evita que el header se aplaste */
    }

    #score-val { font-weight: 900; font-size: 1.8rem; }

    #play-area { 
        position: relative; 
        flex: 1; /* El área de juego ocupa el espacio central disponible */
        overflow: hidden; 
        margin: 5px 15px;
        border-radius: 20px;
        background: rgba(255,255,255,0.03);
    }

    .russian-phrase {
        position: absolute; 
        bottom: -80px;
        left: 10%; width: 80%; 
        background: var(--white); 
        padding: 15px; 
        border-radius: 18px;
        color: #03051a;
        font-size: 1rem; 
        font-weight: 800; 
        text-align: center;
        z-index: 5;
    }

    #controls { 
        padding: 15px 20px; 
        background: var(--surface); 
        border-radius: 24px 24px 0 0;
        flex-shrink: 0; /* Asegura que los botones siempre mantengan su tamaño */
        box-shadow: 0 -5px 20px rgba(0,0,0,0.3);
    }

    .options-grid { 
        display: grid; 
        grid-template-columns: 1fr; 
        gap: 10px; 
        margin-top: 10px;
    }

    .blast-btn { 
        background: var(--blue); 
        color: var(--white); 
        padding: 16px; 
        font-size: 0.95rem; 
        font-weight: bold; 
        border: none; 
        border-radius: 15px; 
        box-shadow: 0 4px 0 #1a1eb3;
    }

    .instruction {
        text-align: center; 
        color: var(--gray); 
        font-size: 0.75rem; 
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    
    /* Ajustes para pantallas pequeñas */
    @media (max-height: 650px) {
        #score-val { font-size: 1.4rem; }
        .blast-btn { padding: 12px; }
        .russian-phrase { padding: 10px; font-size: 0.9rem; }
    }
</style>
