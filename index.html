<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ruso Blast Pro - Mobile</title>
    <style>
        :root {
            --bg: #0a0b1e;
            --surface: #161b33;
            --blue: #353cff;
            --white: #ffffff;
            --green: #58cc02;
            --red: #ff4b4b;
            --sky: #1cb0f6;
            --gray: #afafaf;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; padding: 0; 
        }
        
        body {
            background: var(--bg);
            color: var(--white);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* Solución para Edge/Chrome Móvil: Altura Dinámica */
            height: 100vh;
            height: 100dvh; 
            overflow: hidden;
            display: flex;
            justify-content: center;
            position: fixed; /* Evita scroll accidental */
            width: 100%;
        }

        #game-wrapper {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at top, #1a1f4d 0%, var(--bg) 100%);
            /* Espacio de seguridad inferior */
            padding-bottom: env(safe-area-inset-bottom, 15px);
        }

        /* Pantallas de Interfaz */
        #levels-screen, #overlay {
            position: absolute;
            inset: 0;
            background: rgba(10, 11, 30, 0.98);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 30px;
            backdrop-filter: blur(10px);
        }
        #overlay { display: none; text-align: center; }

        .level-card {
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Header Dinámico */
        #header { 
            padding: 15px 20px 5px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            flex-shrink: 0; 
        }
        #game-title { color: var(--sky); font-size: 0.8rem; font-weight: 900; letter-spacing: 1px; }
        #score-val { font-weight: 900; font-size: 1.8rem; }

        /* Área de Juego Adaptable */
        #play-area { 
            position: relative; 
            flex: 1; /* Esto absorbe el espacio sobrante */
            overflow: hidden; 
            margin: 5px 15px;
            border-radius: 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
        }
        #ceiling-line { 
            position: absolute; 
            top: 0; width: 100%; height: 3px; 
            background: var(--red); 
            box-shadow: 0 0 10px var(--red);
            z-index: 10;
        }

        .russian-phrase {
            position: absolute; 
            bottom: -80px;
            left: 5%; width: 90%; 
            background: var(--white); 
            padding: 18px; 
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4); 
            color: #03051a;
            font-size: 1.1rem; 
            font-weight: 800; 
            text-align: center;
            z-index: 5;
        }

        /* Panel de Controles siempre visible */
        #controls { 
            padding: 15px 20px 10px; 
            background: var(--surface); 
            border-radius: 24px 24px 0 0;
            flex-shrink: 0; 
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }
        .instruction {
            text-align: center; color: var(--gray); font-size: 0.7rem; margin-bottom: 12px;
            font-weight: 600;
        }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }

        .blast-btn { 
            background: var(--blue); 
            color: var(--white); 
            padding: 18px; 
            font-size: 1rem; 
            font-weight: bold; 
            border: none; 
            border-radius: 15px; 
            box-shadow: 0 4px 0 #1a1eb3; 
            transition: transform 0.1s;
        }
        .blast-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #1a1eb3; }

        .correct-flash { background: var(--green) !important; box-shadow: 0 4px 0 #3d8c02 !important; }
        .wrong-flash { background: var(--red) !important; box-shadow: 0 4px 0 #a31d1d !important; }

        /* Pop-up de puntos */
        #pop-anchor { position: absolute; top: 50%; left: 50%; pointer-events: none; }
        .points-pop { 
            position: absolute; transform: translate(-50%, -50%); 
            font-weight: 900; font-size: 2.5rem; 
            animation: popUp 0.8s ease-out forwards; 
        }
        @keyframes popUp { 
            0% { opacity:0; transform: translate(-50%, 0) scale(0.5); }
            100% { opacity:0; transform: translate(-50%, -100px) scale(1.2); } 
        }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <div id="levels-screen">
            <h1 style="color:var(--white); margin-bottom:5px; font-size: 2.2rem; font-weight: 900;">Ruso Blast</h1>
            <p style="color:var(--gray); margin-bottom:30px;">Selecciona un bloque:</p>
            <div class="level-card" onclick="prepareGame(1)"><div><b>BLOQUE 1</b><br><small>Esenciales</small></div><div>➜</div></div>
            <div class="level-card" onclick="prepareGame(2)"><div><b>BLOQUE 2</b><br><small>Intermedio</small></div><div>➜</div></div>
        </div>

        <div id="header">
            <div id="game-title">TRAINING_MODE</div>
            <div id="score-val">0</div>
        </div>
        
        <div id="play-area">
            <div id="ceiling-line"></div>
            <div id="phrase-display" class="russian-phrase"></div>
            <div id="pop-anchor"></div>
        </div>

        <div id="controls">
            <p class="instruction">TRADUCE ANTES DE TOCAR LA LÍNEA</p>
            <div class="options-grid" id="options"></div>
        </div>

        <div id="overlay">
            <h2 id="ov-msg" style="font-size:2rem; margin-bottom:20px;"></h2>
            <button class="blast-btn" style="background:var(--green); box-shadow:0 4px 0 #46a302;" onclick="startGame()">REINTENTAR</button>
            <button class="blast-btn" style="margin-top:10px; background:transparent; border:1px solid #444; box-shadow:none;" onclick="returnToMenu()">MENU</button>
        </div>
    </div>

    <script>
        let audioCtx=null, score=0, phrasesAnswered=0, activeData=[], ceilingCheck, canAnswer=false;
        
        const allPhrases = [
            {r:"Привет, как тебя зовут?", s:"¿Hola, cómo te llamas?"},{r:"Я знаю это место", s:"Yo conozco este lugar"},
            {r:"Я думаю, это хорошая идея", s:"Pienso que es una buena idea"},{r:"Это длинное слово", s:"Esta es una palabra muy larga"},
            {r:"Подожди, я сейчас приду", s:"Espera, ahora vengo"},{r:"Давай пойдём в парк", s:"Vamos al parque"},
            {r:"Я всё понял, спасибо", s:"Lo entendí todo, gracias"},{r:"Короче, мы опоздали", s:"En fin, llegamos tarde"},
            {r:"Кстати, где мой чай?", s:"Por cierto, ¿dónde está mi té?"},{r:"Ладно, давай сделаем это", s:"Está bien, hagámoslo"},
            {r:"Ничего, всё нормально", s:"No es nada, todo bien"},{r:"Осталось мало времени", s:"Queda poco tiempo"},
            {r:"Слышишь, что он говорит?", s:"¿Oyes lo que él dice?"},{r:"Тебе очень идёт это платье!", s:"¡Te queda muy bien ese vestido!"},
            {r:"Ясненько, я всё сделаю", s:"Vale, yo me encargo de todo"},{r:"Капец, как тут холодно!", s:"¡Vaya, qué frío hace aquí!"},
            {r:"Блин, я забыл ключи", s:"Rayos, olvidé las llaves"},{r:"Как дела?", s:"¿Cómo estás?"},
            {r:"Лучше всех", s:"Mejor que todos"},{r:"Всё пучком", s:"Todo va de maravilla"}
        ];

        function initAudio(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); if(audioCtx.state==='suspended') audioCtx.resume(); }
        function playSnd(isC){
            if(!audioCtx) return;
            const n = isC ? [523, 659, 783] : [150, 100];
            n.forEach((f, i) => {
                const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                o.type = isC ? 'sine' : 'sawtooth';
                o.frequency.setValueAtTime(f, audioCtx.currentTime + (i * 0.1));
                g.gain.setValueAtTime(0.1, audioCtx.currentTime + (i * 0.1));
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + (i * 0.1) + 0.3);
                o.connect(g); g.connect(audioCtx.destination);
                o.start(audioCtx.currentTime + (i * 0.1)); o.stop(audioCtx.currentTime + (i * 0.1) + 0.3);
            });
        }

        function showPop(txt, col){
            const a=document.getElementById('pop-anchor'), p=document.createElement('div');
            p.className='points-pop'; p.innerText=txt; p.style.color=col;
            a.appendChild(p); setTimeout(()=>p.remove(),800);
        }
        
        function returnToMenu(){ clearInterval(ceilingCheck); document.getElementById('overlay').style.display='none'; document.getElementById('levels-screen').style.display='flex'; }
        function prepareGame(b){ initAudio(); activeData=(b===1)?allPhrases.slice(0,10):allPhrases.slice(10,20).sort(()=>Math.random()-0.5); document.getElementById('levels-screen').style.display='none'; startGame(); }
        function startGame(){ score=0; phrasesAnswered=0; document.getElementById('score-val').innerText="0"; document.getElementById('overlay').style.display='none'; nextQuestion(); }

        function nextQuestion(){
            if(phrasesAnswered>=activeData.length){ endGame(); return; } 
            canAnswer=false; clearInterval(ceilingCheck); 
            const item=activeData[phrasesAnswered]; 
            const pEl=document.getElementById('phrase-display'); 
            pEl.style.transition='none'; pEl.style.transform='translateY(0)'; 
            pEl.innerText=item.r; 
            const oEl=document.getElementById('options'); oEl.innerHTML=''; 
            let w=allPhrases[Math.floor(Math.random()*allPhrases.length)]; 
            while(w.s===item.s) w=allPhrases[Math.floor(Math.random()*allPhrases.length)]; 
            [{s:item.s,c:true},{s:w.s,c:false}].sort(()=>Math.random()-0.5).forEach(o=>{
                const b=document.createElement('button'); b.className='blast-btn'; 
                b.innerText=o.s; b.onclick=()=>check(o.c,b); oEl.appendChild(b);
            }); 
            setTimeout(() => {
                const travel = document.getElementById('play-area').offsetHeight + 100;
                pEl.style.transition='transform 5s linear'; 
                pEl.style.transform=`translateY(-${travel}px)`; 
                canAnswer=true; 
                ceilingCheck=setInterval(() => {
                    const pTop = pEl.getBoundingClientRect().top;
                    const aTop = document.getElementById('play-area').getBoundingClientRect().top;
                    if(pTop < aTop && canAnswer) fail();
                }, 50);
            }, 150);
        }

        function check(c,b){
            if(!canAnswer) return; canAnswer=false; clearInterval(ceilingCheck); 
            if(c){ playSnd(true); score+=20; b.classList.add('correct-flash'); showPop("+20","var(--green)"); }
            else{ playSnd(false); score=Math.max(0,score-10); b.classList.add('wrong-flash'); showPop("-10","var(--red)"); } 
            phrasesAnswered++; document.getElementById('score-val').innerText=score; 
            setTimeout(nextQuestion, 800);
        }

        function fail(){
            canAnswer=false; clearInterval(ceilingCheck); playSnd(false); 
            score=Math.max(0,score-10); showPop("¡TIEMPO!","var(--red)"); 
            phrasesAnswered++; document.getElementById('score-val').innerText=score; 
            setTimeout(nextQuestion, 800);
        }

        function endGame(){ document.getElementById('overlay').style.display='flex'; document.getElementById('ov-msg').innerText="Puntos: "+score; }
    </script>
</body>
</html>
